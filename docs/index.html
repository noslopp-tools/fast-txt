<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fast_TXT Legal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101010;
      --panel: #1a1a1a;
      --text: #f2f2f2;
      --muted: #bcbcbc;
      --accent: #ffb000;
      --border: #2b2b2b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #141414 0%, #0c0c0c 100%);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      max-width: 840px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }
    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.15;
    }
    p, li { color: var(--muted); }
    a { color: var(--accent); }
    ul {
      margin: 24px 0 0;
      padding-left: 20px;
    }
    .meta {
      margin: 0 0 24px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <p class="eyebrow">Fast_TXT</p>
      <h1>Legal Documents</h1>
      <p class="meta">Public legal pages for the Fast_TXT Android release.</p>
      <ul>
        <li><a href="./privacy.html">Privacy Policy</a></li>
        <li><a href="./terms.html">Terms of Service</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
